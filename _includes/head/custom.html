{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#f7f4f1"/>

<style>
  :root {
    --lin-ink: #23272f;
    --lin-gray: #7e838c;
    --lin-gray-soft: #f4f1ee;
    --lin-paper: rgba(255, 255, 255, 0.86);
    --lin-line: rgba(126, 131, 140, 0.22);
    --lin-orange: #ff6900;
    --lin-orange-soft: #fff0e7;
    --lin-green: #3f8f62;
    --lin-pink: #f5b6c8;
    --lin-lavender: #a991d4;
    --lin-shadow: 0 20px 50px rgba(35, 39, 47, 0.09);
  }

  body {
    color: var(--lin-ink);
    background:
      linear-gradient(135deg, rgba(255, 105, 0, 0.13), rgba(245, 182, 200, 0.11) 34%, rgba(169, 145, 212, 0.13) 68%, rgba(63, 143, 98, 0.1)),
      var(--lin-gray-soft);
  }

  .masthead {
    background: rgba(255, 255, 255, 0.78);
    border-bottom: 1px solid var(--lin-line);
    box-shadow: 0 10px 28px rgba(35, 39, 47, 0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .greedy-nav {
    background: transparent;
  }

  .greedy-nav a {
    color: var(--lin-ink);
    font-weight: 700;
    letter-spacing: 0;
    position: relative;
  }

  .greedy-nav a::after {
    content: "";
    position: absolute;
    left: 0.75rem;
    right: 0.75rem;
    bottom: 0.32rem;
    height: 2px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--lin-orange), var(--lin-pink), var(--lin-lavender));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 180ms ease;
  }

  .greedy-nav a:hover,
  .greedy-nav .visible-links .active a,
  .greedy-nav .visible-links .selected a {
    color: var(--lin-orange);
  }

  .greedy-nav a:hover::after,
  .greedy-nav .visible-links .active a::after,
  .greedy-nav .visible-links .selected a::after {
    transform: scaleX(1);
  }

  .page,
  .archive {
    background: var(--lin-paper);
    border: 1px solid rgba(255, 255, 255, 0.68);
    border-radius: 18px;
    box-shadow: var(--lin-shadow);
    padding: 1.8rem;
    animation: lin-page-in 420ms ease both;
  }

  .page__title {
    color: var(--lin-ink);
    letter-spacing: 0;
  }

  .page__title::after,
  .archive h1::after {
    content: "";
    display: block;
    width: 5.2rem;
    height: 4px;
    margin-top: 0.72rem;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--lin-orange), var(--lin-green), var(--lin-lavender));
  }

  .page__content h2 {
    color: var(--lin-ink);
    border-bottom: 1px solid var(--lin-line);
    padding-bottom: 0.45rem;
  }

  .page__content h2::before {
    content: "";
    display: inline-block;
    width: 0.68rem;
    height: 0.68rem;
    margin-right: 0.48rem;
    border-radius: 50%;
    background: var(--lin-orange);
    box-shadow: 0 0 0 5px var(--lin-orange-soft);
    vertical-align: 0.05rem;
  }

  .page__content h3 {
    color: #2d3340;
  }

  .page__content a {
    color: var(--lin-orange);
    text-decoration-color: rgba(255, 105, 0, 0.28);
    text-decoration-thickness: 2px;
    text-underline-offset: 3px;
  }

  .page__content p,
  .page__content li {
    color: #3f4652;
  }

  .page__content ul {
    padding-left: 1.1rem;
  }

  .page__content li::marker {
    color: var(--lin-green);
  }

  .page__content > p,
  .page__content > ul,
  .page__content h3 {
    transition: transform 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
  }

  .page__content h3 {
    width: fit-content;
    padding: 0.18rem 0.46rem;
    margin-left: -0.46rem;
    border-radius: 8px;
  }

  .page__content h3:hover {
    background: linear-gradient(90deg, rgba(255, 105, 0, 0.1), rgba(245, 182, 200, 0.13));
    transform: translateY(-1px);
  }

  .sidebar {
    animation: lin-page-in 520ms ease 80ms both;
  }

  .author__avatar img,
  img.author__avatar {
    border: 4px solid #ffffff;
    box-shadow: 0 14px 34px rgba(255, 105, 0, 0.16), 0 0 0 7px rgba(169, 145, 212, 0.12);
    transition: transform 240ms ease, box-shadow 240ms ease;
  }

  .author__avatar img:hover,
  img.author__avatar:hover {
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 18px 42px rgba(255, 105, 0, 0.2), 0 0 0 7px rgba(63, 143, 98, 0.14);
  }

  .author__name {
    color: var(--lin-ink);
  }

  .author__bio,
  .author__urls {
    color: var(--lin-gray);
  }

  .author__urls-wrapper .btn {
    display: none;
  }

  .page__footer {
    background: transparent;
    color: var(--lin-gray);
  }

  @keyframes lin-page-in {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 768px) {
    .page,
    .archive {
      border-radius: 14px;
      padding: 1.15rem;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>

<!-- end custom head snippets -->
